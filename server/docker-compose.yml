services:
  backend:
    build: .
    container_name: deepseek-kb-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data          # Persistent data (SQLite + ChromaDB)
      - ./.env:/app/.env:ro       # Environment config
    environment:
      - DATA_DIR=/app/data
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    container_name: deepseek-kb-web
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  web_node_modules:
