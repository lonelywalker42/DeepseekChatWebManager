<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        width: 280px;
        margin: 0;
        padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 14px;
      }
      h1 {
        font-size: 16px;
        font-weight: 600;
        margin: 0 0 12px;
      }
      .stats {
        display: flex;
        gap: 12px;
        margin-bottom: 12px;
      }
      .stat-card {
        flex: 1;
        background: #f3f4f6;
        border-radius: 8px;
        padding: 10px;
        text-align: center;
      }
      .stat-number {
        font-size: 20px;
        font-weight: 700;
        color: #1f2937;
      }
      .stat-label {
        font-size: 11px;
        color: #6b7280;
        margin-top: 2px;
      }
      button {
        width: 100%;
        padding: 8px 12px;
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
        margin-bottom: 8px;
      }
      button:hover {
        background: #1d4ed8;
      }
      button.secondary {
        background: #f3f4f6;
        color: #374151;
      }
      button.secondary:hover {
        background: #e5e7eb;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      #status-message {
        font-size: 12px;
        color: #6b7280;
        text-align: center;
        margin-top: 8px;
        min-height: 18px;
      }
    </style>
  </head>
  <body>
    <h1>DeepSeekChat Manager</h1>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-number" id="topic-count">-</div>
        <div class="stat-label">Topics</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="session-count">-</div>
        <div class="stat-label">Sessions</div>
      </div>
    </div>

    <button id="open-manager">Open Manager</button>
    <button id="scrape-page" class="secondary" disabled>Scrape Current Page</button>
    <div id="status-message"></div>

    <script src="./popup.tsx" type="module"></script>
  </body>
</html>
